<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Protocolo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Gerenciamento de Documentos - Novo Protocolo</h4>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label class="form-label">Título do Protocolo</label>
                                {{ form.titulo }}
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Descrição Detalhada</label>
                                {{ form.descricao }}
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Categoria</label>
                                {{ form.categoria }}
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Documento Associado (PDF, DOCX)</label>
                                {{ form.documento }}
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <a href="{% url 'listar_protocolos' %}" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-success">Salvar Protocolo</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
